name: CI
on: [push, pull_request]
jobs:
  frontend:
    runs-on: ubuntu-latest
    steps: [{uses: actions/checkout@v4},{uses: actions/setup-node@v4,with: {node-version: 22,cache: npm}},{run: npm ci},{run: npm run lint},{run: npm test},{run: npm run build}]
  backend:
    runs-on: ubuntu-latest
    steps: [{uses: actions/checkout@v4},{uses: actions/setup-python@v5,with: {python-version: '3.12'}},{run: pip install -r backend/requirements.txt},{run: pytest backend/tests -q}]
  containers:
    runs-on: ubuntu-latest
    steps: [{uses: actions/checkout@v4},{run: docker compose build}]
